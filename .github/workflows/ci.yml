name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        # The dedup test mocks the real Open-Meteo call via respx, so no
        # network access is required.
        run: pytest -q

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Plain `docker build` uses the runner's built-in BuildKit (the default
      # driver) rather than the docker-container driver from setup-buildx, which
      # pulls moby/buildkit from Docker Hub and can time out on a flaky runner.
      # No API keys are passed — the image must build without credentials.
      - name: Build image (no push, no credentials)
        run: docker build -t watchagent:ci .

      - name: Smoke test (start container, check /health)
        run: ./scripts/smoke_test.sh watchagent:ci
